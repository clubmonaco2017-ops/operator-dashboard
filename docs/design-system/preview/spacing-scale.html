<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body class="dark" style="margin:0;padding:20px;background:var(--bg);color:var(--fg1)">
<div style="display:grid;grid-template-columns:repeat(8,auto);gap:14px;align-items:flex-end">
  <div style="text-align:center"><div style="width:4px;height:32px;background:var(--primary)"></div><code style="font-size:10px;color:var(--fg2)">1·4</code></div>
  <div style="text-align:center"><div style="width:8px;height:32px;background:var(--primary)"></div><code style="font-size:10px;color:var(--fg2)">2·8</code></div>
  <div style="text-align:center"><div style="width:12px;height:32px;background:var(--primary)"></div><code style="font-size:10px;color:var(--fg2)">3·12</code></div>
  <div style="text-align:center"><div style="width:16px;height:32px;background:var(--primary)"></div><code style="font-size:10px;color:var(--fg2)">4·16</code></div>
  <div style="text-align:center"><div style="width:20px;height:32px;background:var(--primary)"></div><code style="font-size:10px;color:var(--fg2)">5·20</code></div>
  <div style="text-align:center"><div style="width:24px;height:32px;background:var(--primary)"></div><code style="font-size:10px;color:var(--fg2)">6·24</code></div>
  <div style="text-align:center"><div style="width:32px;height:32px;background:var(--primary)"></div><code style="font-size:10px;color:var(--fg2)">8·32</code></div>
  <div style="text-align:center"><div style="width:48px;height:32px;background:var(--primary)"></div><code style="font-size:10px;color:var(--fg2)">12·48</code></div>
</div>
<div style="margin-top:22px;display:flex;gap:8px;align-items:center">
  <div style="padding:8px 14px;background:var(--primary);color:#fff;border-radius:8px;font-size:13px;font-weight:600">Создать</div>
  <div style="width:var(--sp-3)"></div>
  <div style="padding:8px 14px;border:1px solid var(--border);border-radius:8px;color:var(--fg1);font-size:13px;font-weight:500;background:var(--surface)">Отмена</div>
</div>
<div style="color:var(--fg3);font-size:11px;margin-top:6px">button gap · <code>--sp-3</code> (12px)</div>
</body></html>
