<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body class="dark" style="margin:0;padding:20px;background:var(--bg);color:var(--fg1)">
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
  <button style="padding:8px 14px;background:var(--primary);color:#fff;border:0;border-radius:8px;font:600 13px var(--font-sans);cursor:pointer">Создать</button>
  <button style="padding:8px 14px;background:var(--primary-hover);color:#fff;border:0;border-radius:8px;font:600 13px var(--font-sans)">Hover</button>
  <button style="padding:8px 14px;background:var(--surface);color:var(--fg1);border:1px solid var(--border);border-radius:8px;font:500 13px var(--font-sans)">Отмена</button>
  <button style="padding:8px 14px;background:transparent;color:var(--fg2);border:0;border-radius:8px;font:500 13px var(--font-sans)">Ghost</button>
  <button style="padding:8px 14px;background:var(--surface);color:var(--danger-ink);border:1px solid color-mix(in oklch,var(--danger) 40%,var(--border));border-radius:8px;font:500 13px var(--font-sans)">Удалить</button>
  <button style="padding:8px 14px;background:var(--primary);color:#fff;border:0;border-radius:8px;font:600 13px var(--font-sans);opacity:0.5;cursor:not-allowed">Disabled</button>
</div>
<div style="margin-top:14px;display:flex;gap:8px;align-items:center">
  <button style="padding:6px 10px;background:var(--surface);color:var(--fg2);border:1px solid var(--border);border-radius:6px;font:500 12px var(--font-sans);display:inline-flex;align-items:center;gap:6px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Добавить</button>
  <button style="padding:6px 10px;background:var(--primary-soft-2);color:var(--primary-ink);border:1px solid color-mix(in oklch,var(--primary) 40%,transparent);border-radius:999px;font:500 12px var(--font-sans)">Активные · 12</button>
  <button style="padding:6px 10px;background:transparent;color:var(--fg2);border:1px dashed var(--border-strong);border-radius:999px;font:500 12px var(--font-sans)">+ Фильтр</button>
  <span style="padding:4px 8px;font:500 11px var(--font-mono);border:1px solid var(--border);border-radius:4px;color:var(--fg3);background:var(--surface-2)">⌘K</span>
</div>
</body></html>
