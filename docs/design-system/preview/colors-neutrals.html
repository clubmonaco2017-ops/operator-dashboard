<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body class="dark" style="margin:0;padding:20px;background:var(--bg);color:var(--fg1)">
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
  <div><div style="height:48px;background:var(--bg);border:1px solid var(--border);border-radius:8px"></div><div class="label-caps" style="margin-top:6px;font-size:10px">bg</div></div>
  <div><div style="height:48px;background:var(--surface);border:1px solid var(--border);border-radius:8px"></div><div class="label-caps" style="margin-top:6px;font-size:10px">surface</div></div>
  <div><div style="height:48px;background:var(--surface-2);border-radius:8px"></div><div class="label-caps" style="margin-top:6px;font-size:10px">surface-2</div></div>
  <div><div style="height:48px;background:var(--surface-3);border-radius:8px"></div><div class="label-caps" style="margin-top:6px;font-size:10px">surface-3</div></div>
  <div><div style="height:48px;background:var(--border);border-radius:8px"></div><div class="label-caps" style="margin-top:6px;font-size:10px">border</div></div>
  <div><div style="height:48px;background:var(--border-strong);border-radius:8px"></div><div class="label-caps" style="margin-top:6px;font-size:10px">border-strong</div></div>
</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px"><div style="color:var(--fg1)">fg1 Primary text</div></div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px"><div style="color:var(--fg2)">fg2 Secondary</div></div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px"><div style="color:var(--fg3)">fg3 Muted</div></div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px"><div style="color:var(--fg4)">fg4 Disabled</div></div>
</div>
</body></html>
