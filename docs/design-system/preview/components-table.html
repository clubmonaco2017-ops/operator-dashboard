<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body class="dark" style="margin:0;padding:0;background:var(--bg);color:var(--fg1);font:14px var(--font-sans)">
<div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;background:var(--surface)">
  <span style="padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;background:var(--primary-soft-2);color:var(--primary-ink);border:1px solid color-mix(in oklch,var(--primary) 40%,transparent)">Роль · Админ</span>
  <span style="padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;background:var(--primary-soft-2);color:var(--primary-ink);border:1px solid color-mix(in oklch,var(--primary) 40%,transparent)">Смена · Вечер</span>
  <span style="padding:4px 10px;border-radius:999px;font-size:11px;color:var(--fg3);border:1px dashed var(--border-strong)">+ Фильтр</span>
  <div style="flex:1"></div>
  <span style="padding:4px 8px;font:500 11px var(--font-mono);border:1px solid var(--border);border-radius:4px;color:var(--fg3);background:var(--surface-2)">/</span>
</div>
<table style="width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums">
  <thead>
    <tr style="background:var(--surface-2);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--fg3);text-align:left">
      <th style="padding:9px 12px;font-weight:600">Сотрудник</th>
      <th style="padding:9px 12px;font-weight:600">Роль</th>
      <th style="padding:9px 12px;font-weight:600">Смена</th>
      <th style="padding:9px 12px;font-weight:600;text-align:right">Выручка</th>
    </tr>
  </thead>
  <tbody style="font-size:13px">
    <tr style="border-top:1px solid var(--border)">
      <td style="padding:10px 12px"><span style="display:inline-flex;align-items:center;gap:8px"><span style="width:24px;height:24px;border-radius:999px;background:var(--primary-soft-2);color:var(--primary-ink);font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center">ИП</span>Иван Петров</span></td>
      <td style="padding:10px 12px;color:var(--fg2)">Оператор</td>
      <td style="padding:10px 12px;color:var(--shift-evening);font-size:11px;font-weight:600">ВЕЧЕРНЯЯ</td>
      <td style="padding:10px 12px;text-align:right;font-weight:600">$ 1 240.50</td>
    </tr>
    <tr style="border-top:1px solid var(--border);background:var(--surface-2)">
      <td style="padding:10px 12px"><span style="display:inline-flex;align-items:center;gap:8px"><span style="width:24px;height:24px;border-radius:999px;background:var(--primary-soft-2);color:var(--primary-ink);font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center">АС</span>Анна Сидорова</span></td>
      <td style="padding:10px 12px;color:var(--fg2)">Модератор</td>
      <td style="padding:10px 12px;color:var(--shift-day);font-size:11px;font-weight:600">ДНЕВНАЯ</td>
      <td style="padding:10px 12px;text-align:right;font-weight:600">$ 980.00</td>
    </tr>
  </tbody>
</table>
</body></html>
