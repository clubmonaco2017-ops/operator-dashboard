<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body class="dark" style="margin:0;padding:24px;background:var(--bg);color:var(--fg1)">
<div style="display:flex;gap:28px;align-items:center">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="width:14px;height:14px;border-radius:999px;background:var(--shift-day)"></span>
    <div><div class="label-caps">Day · ДНЕВНАЯ</div><div style="font-size:11px;color:var(--fg3)">09:00 - 17:00</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="width:14px;height:14px;border-radius:999px;background:var(--shift-evening)"></span>
    <div><div class="label-caps">Evening · ВЕЧЕРНЯЯ</div><div style="font-size:11px;color:var(--fg3)">17:00 - 01:00</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="width:14px;height:14px;border-radius:999px;background:var(--shift-night)"></span>
    <div><div class="label-caps">Night · НОЧНАЯ</div><div style="font-size:11px;color:var(--fg3)">01:00 - 09:00</div></div>
  </div>
</div>
<div style="margin-top:26px;display:flex;gap:10px;flex-wrap:wrap">
  <span style="padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;background:color-mix(in oklch,var(--role-superadmin) 20%,transparent);color:var(--role-superadmin)">Супер-Админ</span>
  <span style="padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;background:color-mix(in oklch,var(--role-admin) 20%,transparent);color:var(--role-admin)">Админ</span>
  <span style="padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;background:color-mix(in oklch,var(--role-moderator) 20%,transparent);color:var(--role-moderator)">Модератор</span>
  <span style="padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;background:color-mix(in oklch,var(--role-teamlead) 20%,transparent);color:var(--role-teamlead)">Тим Лидер</span>
  <span style="padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;background:var(--surface-3);color:var(--fg2)">Оператор</span>
</div>
</body></html>
