<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body class="dark" style="margin:0;padding:20px;background:var(--bg);color:var(--fg1)">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
  <div style="display:flex;flex-direction:column;gap:4px"><div style="height:40px;background:var(--success);border-radius:8px"></div><div style="height:18px;background:var(--success-soft);border-radius:4px"></div><div class="label-caps" style="margin-top:4px">Success</div></div>
  <div style="display:flex;flex-direction:column;gap:4px"><div style="height:40px;background:var(--warning);border-radius:8px"></div><div style="height:18px;background:var(--warning-soft);border-radius:4px"></div><div class="label-caps" style="margin-top:4px">Warning</div></div>
  <div style="display:flex;flex-direction:column;gap:4px"><div style="height:40px;background:var(--danger);border-radius:8px"></div><div style="height:18px;background:var(--danger-soft);border-radius:4px"></div><div class="label-caps" style="margin-top:4px">Danger</div></div>
  <div style="display:flex;flex-direction:column;gap:4px"><div style="height:40px;background:var(--info);border-radius:8px"></div><div style="height:18px;background:var(--info-soft);border-radius:4px"></div><div class="label-caps" style="margin-top:4px">Info</div></div>
</div>
</body></html>
