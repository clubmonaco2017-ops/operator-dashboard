<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body class="dark" style="margin:0;padding:20px;background:var(--bg);color:var(--fg1)">
<div style="display:flex;gap:8px;flex-wrap:wrap">
  <span style="padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;background:color-mix(in oklch,var(--status-done) 22%,transparent);color:var(--success-ink);display:inline-flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:999px;background:var(--status-done)"></span>Выполнено</span>
  <span style="padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;background:color-mix(in oklch,var(--status-in-progress) 22%,transparent);color:var(--primary-ink);display:inline-flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:999px;background:var(--status-in-progress)"></span>В работе</span>
  <span style="padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;background:var(--surface-3);color:var(--fg2);display:inline-flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:999px;background:var(--status-pending)"></span>Ожидает</span>
  <span style="padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;background:color-mix(in oklch,var(--status-overdue) 22%,transparent);color:var(--danger-ink);display:inline-flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:999px;background:var(--status-overdue)"></span>Просрочено</span>
</div>
<div style="margin-top:14px;display:flex;gap:10px;align-items:center;font-size:13px;color:var(--fg2)">
  <span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:999px;background:var(--success)"></span>Активен</span>
  <span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:999px;background:var(--fg4)"></span>Неактивен</span>
  <span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:999px;background:var(--warning)"></span>Запрос ожидает</span>
</div>
</body></html>
