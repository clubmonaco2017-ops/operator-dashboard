<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body class="dark" style="margin:0;padding:20px;background:var(--bg);color:var(--fg1)">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:640px">
  <div>
    <div class="label-caps" style="margin-bottom:6px">EMAIL</div>
    <input value="ivan@agency.local" style="width:100%;padding:9px 12px;background:var(--surface);color:var(--fg1);border:1px solid var(--border);border-radius:8px;font:14px var(--font-sans);box-sizing:border-box"/>
  </div>
  <div>
    <div class="label-caps" style="margin-bottom:6px">РОЛЬ</div>
    <div style="width:100%;padding:9px 12px;background:var(--surface);color:var(--fg1);border:1px solid var(--border);border-radius:8px;font:14px var(--font-sans);display:flex;justify-content:space-between;align-items:center;box-sizing:border-box">Модератор <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div>
  </div>
  <div>
    <div class="label-caps" style="margin-bottom:6px">СМЕНА</div>
    <input style="width:100%;padding:9px 12px;background:var(--surface);color:var(--fg1);border:1px solid var(--primary);border-radius:8px;font:14px var(--font-sans);box-sizing:border-box;box-shadow:0 0 0 3px oklch(0.623 0.188 259.8 / 0.35)" value="ВЕЧЕРНЯЯ"/>
  </div>
  <div>
    <div class="label-caps" style="margin-bottom:6px">ПАРОЛЬ</div>
    <input value="••••••" disabled style="width:100%;padding:9px 12px;background:var(--surface-2);color:var(--fg4);border:1px solid var(--border);border-radius:8px;font:14px var(--font-sans);box-sizing:border-box;cursor:not-allowed"/>
  </div>
</div>
<div style="margin-top:14px;display:flex;gap:10px;align-items:center">
  <label style="display:flex;align-items:center;gap:8px;color:var(--fg2);font-size:13px">
    <span style="width:16px;height:16px;border:1.5px solid var(--primary);border-radius:4px;background:var(--primary);display:inline-flex;align-items:center;justify-content:center"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
    manage_teams
  </label>
  <label style="display:flex;align-items:center;gap:8px;color:var(--fg2);font-size:13px">
    <span style="width:16px;height:16px;border:1.5px solid var(--border-strong);border-radius:4px;background:var(--surface);display:inline-flex"></span>
    view_all_revenue
  </label>
  <div style="width:36px;height:20px;background:var(--primary);border-radius:999px;position:relative"><span style="position:absolute;top:2px;left:18px;width:16px;height:16px;border-radius:999px;background:#fff"></span></div>
  <span style="color:var(--fg2);font-size:13px">Только активные</span>
</div>
</body></html>
