<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body class="dark" style="margin:0;padding:20px;background:var(--bg);color:var(--fg1)">
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px">
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:40px;height:40px;background:var(--primary);border-radius:var(--radius-sm)"></div><code style="font-size:10px;color:var(--fg2)">sm · 6</code></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:40px;height:40px;background:var(--primary);border-radius:var(--radius-md)"></div><code style="font-size:10px;color:var(--fg2)">md · 8</code></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:40px;height:40px;background:var(--primary);border-radius:var(--radius-lg)"></div><code style="font-size:10px;color:var(--fg2)">lg · 10</code></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:40px;height:40px;background:var(--primary);border-radius:var(--radius-xl)"></div><code style="font-size:10px;color:var(--fg2)">xl · 14</code></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:40px;height:40px;background:var(--primary);border-radius:var(--radius-2xl)"></div><code style="font-size:10px;color:var(--fg2)">2xl · 18</code></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:40px;height:40px;background:var(--primary);border-radius:999px"></div><code style="font-size:10px;color:var(--fg2)">pill</code></div>
</div>
<div style="margin-top:20px;display:flex;gap:14px;align-items:flex-end">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;width:92px;height:56px;box-shadow:var(--elev-1)"></div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;width:92px;height:56px;box-shadow:var(--elev-2)"></div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;width:92px;height:56px;box-shadow:var(--elev-3)"></div>
</div>
<div style="display:flex;gap:14px;margin-top:6px">
  <code style="font-size:10px;color:var(--fg2);width:92px;text-align:center">elev-1</code>
  <code style="font-size:10px;color:var(--fg2);width:92px;text-align:center">elev-2</code>
  <code style="font-size:10px;color:var(--fg2);width:92px;text-align:center">elev-3</code>
</div>
</body></html>
