<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body class="dark" style="margin:0;padding:24px;background:var(--bg);color:var(--fg1);font:14px var(--font-sans)">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:stretch">

  <!-- Filter empty state -->
  <div style="padding:24px 20px;border:1px dashed var(--border-strong);border-radius:14px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:220px">
    <div style="width:44px;height:44px;border-radius:12px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--fg3);flex-shrink:0">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <div style="font-weight:600;margin-top:4px">Ничего не подошло</div>
    <div style="color:var(--fg3);font-size:12px;max-width:240px">Снимите фильтр «Модераторы» или сбросьте все.</div>
    <button style="margin-top:4px;padding:6px 12px;background:transparent;color:var(--primary);border:1px solid var(--border);border-radius:8px;font:500 12px var(--font-sans);cursor:pointer">Сбросить фильтры</button>
    <div class="label-caps" style="margin-top:6px;color:var(--fg4)">FILTER</div>
  </div>

  <!-- Selection empty state -->
  <div style="padding:24px 20px;border:1px dashed var(--border-strong);border-radius:14px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:220px">
    <div style="width:44px;height:44px;border-radius:12px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--fg3);flex-shrink:0">
      <!-- Lucide MousePointerClick -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 9l5 12 1.8-5.2L21 14z"/><path d="M7.2 2.2l0.8 2.4"/><path d="M2.2 7.2l2.4 0.8"/><path d="M15.8 2.2l-0.8 2.4"/><path d="M4.6 15l-2.4 0.8"/></svg>
    </div>
    <div style="font-weight:600;margin-top:4px">Выберите сотрудника</div>
    <div style="color:var(--fg3);font-size:12px;max-width:240px">Детали откроются в этой панели.</div>
    <div class="label-caps" style="margin-top:6px;color:var(--fg4)">SELECTION</div>
  </div>

</div>
</body></html>
